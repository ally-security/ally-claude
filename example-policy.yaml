inference:
  provider: bedrock
  bedrock_region: us-east-1
  bedrock_token: "..."

banner:
  enabled: false

servers:
  - name: linear
    url: https://mcp.linear.app/mcp
    transport: http
    oauth: true

  - name: figma
    url: https://mcp.figma.com/mcp
    transport: http
    oauth: true

  # - name: figma-desktop
  #   url: http://127.0.0.1:3845/mcp
  #   transport: http

  - name: posthog
    url: https://mcp.posthog.com/mcp
    transport: http
    oauth: true

  # HubSpot — MCP Auth App required (see docs/hubspot.md)
  # - name: hubspot
  #   url: https://mcp.hubspot.com/anthropic
  #   transport: http
  #   oauth:
  #     client_id: "YOUR_HUBSPOT_CLIENT_ID"
  #     client_secret: "YOUR_HUBSPOT_CLIENT_SECRET"
  #   callback_port: 3119

  - name: slack
    url: https://mcp.slack.com/mcp
    transport: http
    oauth:
      client_id: "YOUR_SLACK_CLIENT_ID"
      client_secret: "YOUR_SLACK_CLIENT_SECRET"
    callback_port: 3118
    tool_policy:
      slack_search_public: allow
      slack_read_channel: allow
      slack_send_message_draft: ask
      # ... list every Slack MCP tool

  - google_service: gmail
    client_id: "YOUR_ID.apps.googleusercontent.com"
    client_secret: "GOCSPX-..."
    scope: "https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.compose"
    tool_policy:
      list_drafts: allow
      create_draft: ask
      # ... list every Gmail MCP tool

  - google_service: drive
    client_id: "YOUR_ID.apps.googleusercontent.com"
    client_secret: "GOCSPX-..."
    scope: "https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/drive.file"

  - google_service: calendar
    client_id: "YOUR_ID.apps.googleusercontent.com"
    client_secret: "GOCSPX-..."
    scope: "https://www.googleapis.com/auth/calendar.calendarlist.readonly https://www.googleapis.com/auth/calendar.events.freebusy https://www.googleapis.com/auth/calendar.events.readonly"
