version: 2

project_name: claude-3p-helper

before:
  hooks:
    - go mod tidy

builds:
  - id: claude-3p-helper
    main: ./cmd/claude-3p-helper
    binary: claude-3p-helper
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - windows
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/anthropics/claude-3p-helper/internal/version.Version={{ .Version }}
      - -X github.com/anthropics/claude-3p-helper/internal/version.Commit={{ .ShortCommit }}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README*
      - LICENSE*
      - examples/**/*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  mode: replace
