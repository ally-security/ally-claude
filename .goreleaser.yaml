version: 2

project_name: ally-claude

before:
  hooks:
    - go mod tidy
    # Build helpers so they embed into ally3p (extracted via `ally3p prereq`).
    - go build -o cmd/ally-claude-3p/embedded/google-workspace-mcp-auth ./cmd/google-workspace-mcp-auth
    - go build -o cmd/ally-claude-3p/embedded/slack-mcp-auth ./cmd/slack-mcp-auth
    - go build -o cmd/ally-claude-3p/embedded/hubspot-mcp-auth ./cmd/hubspot-mcp-auth

builds:
  - id: ally3p
    main: ./cmd/ally-claude-3p
    binary: ally3p
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - install.sh

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  draft: false
  prerelease: auto
