name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: validate install.sh
        run: |
          bash -n install.sh
          grep -q 'ally3p prereq' install.sh
          grep -q 'ally3p_' install.sh

      - name: go build
        run: make build

      - name: go test
        run: go test ./...

  cross-compile:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -o cmd/ally-claude-3p/embedded/google-workspace-mcp-auth ./cmd/google-workspace-mcp-auth
          go build -o cmd/ally-claude-3p/embedded/slack-mcp-auth ./cmd/slack-mcp-auth
          go build -o cmd/ally-claude-3p/embedded/hubspot-mcp-auth ./cmd/hubspot-mcp-auth
          go build -o /dev/null ./cmd/ally-claude-3p
          go build -o /dev/null ./cmd/slack-mcp-auth
          go build -o /dev/null ./cmd/hubspot-mcp-auth

  release:
    runs-on: ubuntu-latest
    needs: [test, cross-compile]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    concurrency:
      group: release-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute next tag
        id: tag
        run: |
          git fetch --tags --force
          latest="$(git tag -l 'v*' --sort=-version:refname | head -1)"
          if [ -z "$latest" ]; then
            new_tag="v0.1.0"
          else
            version="${latest#v}"
            major="${version%%.*}"
            rest="${version#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
            patch="${patch%%-*}"
            new_patch=$((patch + 1))
            new_tag="v${major}.${minor}.${new_patch}"
          fi
          echo "latest=${latest:-none}" >> "$GITHUB_OUTPUT"
          echo "tag=${new_tag}" >> "$GITHUB_OUTPUT"
          echo "Next tag: ${new_tag} (after ${latest:-none})"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
